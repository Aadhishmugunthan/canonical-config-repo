rules:

# Rule 1: Validate Required Metadata
- name: "AVS - Validate Required Metadata"
  description: "Ensure eventMetadata is not null or empty"
  priority: 2
  condition: "eventMetadata == null || eventMetadata.trim().isEmpty()"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Ignoring event with missing metadata: ' + envelope.getEventId())"


# Rule 2: Ignore Test Events
- name: "AVS - Ignore Test Events"
  description: "Ignore events from test environments"
  priority: 1
  condition: "eventSource != null && eventSource.toLowerCase().contains('test')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Ignoring TEST event: ' + envelope.getEventId())"


# Rule 3: Validate Event Payload
- name: "AVS - Validate Payload"
  description: "Ensure event payload is not empty"
  priority: 2
  condition: "eventPayload == null || eventPayload.trim().isEmpty() || eventPayload.equals('{}') || eventPayload.equals('null')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Ignoring event with empty payload: ' + envelope.getEventId())"


# Rule 4: Default acquiringICA if Non-Numeric
- name: "AVS - Default ACQ_ICA"
  description: "Set acquiringICA to 0 if non-numeric"
  priority: 3
  condition: "envelope.getEventPayload().contains('acquiringICA') && !envelope.getEventPayload().matches('.*\"acquiringICA\":\"[0-9]+\".*')"
  actions:
    - "envelope.setEventPayload(envelope.getEventPayload().replaceAll('\"acquiringICA\":\"[^\"]*\"','\"acquiringICA\":\"0\"'))"
    - "System.out.println('Rule: acquiringICA corrected for event: ' + envelope.getEventId())"


# Rule 5: Ignore if avsTranId Missing
- name: "AVS - Missing Transaction ID"
  description: "Ignore events where avsTranId is missing"
  priority: 1
  condition: "!envelope.getEventPayload().contains('avsTranId')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Missing avsTranId for event: ' + envelope.getEventId())"


# Rule 6: Validate Event Source
- name: "AVS - Validate Event Source"
  description: "Ignore events from invalid sources"
  priority: 1
  condition: "eventSource == null || (!eventSource.toUpperCase().contains('AVS') && !eventSource.toUpperCase().contains('AIS') && !eventSource.toUpperCase().contains('NVS'))"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Invalid event source ' + eventSource + ' for event: ' + envelope.getEventId())"


# Rule 7: Validate Regulatory Region
- name: "AVS - Validate Regulatory Region"
  description: "Allow only STL or ATL regions"
  priority: 1
  condition: "regulatoryRegion == null || (!regulatoryRegion.equalsIgnoreCase('STL') && !regulatoryRegion.equalsIgnoreCase('ATL'))"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Invalid regulatory region ' + regulatoryRegion + ' for event: ' + envelope.getEventId())"


# Rule 8: Default SW_SER_NUM
- name: "AVS - Default SW_SER_NUM"
  description: "Ensure switchSerialNumber is numeric"
  priority: 3
  condition: "envelope.getEventPayload().contains('switchSerialNumber') && !envelope.getEventPayload().matches('.*\"switchSerialNumber\":\"[0-9]+\".*')"
  actions:
    - "envelope.setEventPayload(envelope.getEventPayload().replaceAll('\"switchSerialNumber\":\"[^\"]*\"','\"switchSerialNumber\":\"0000\"'))"
    - "System.out.println('Rule: switchSerialNumber defaulted to 0000 for event: ' + envelope.getEventId())"
