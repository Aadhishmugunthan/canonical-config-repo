---
# AUTHORIZATION Event Rules - Complete Set


# Rule 1: Validate Required Metadata
- name: "AUTH - Validate Required Metadata"
  description: "Ensure eventMetadata is not null or empty"
  priority: 2
  condition: "eventMetadata == null || eventMetadata.trim().isEmpty()"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('⚠️ Rule: Ignoring event with missing metadata: ' + envelope.getEventId())"


# Rule 2: Ignore Test Events
- name: "AUTH - Ignore Test Events"
  description: "Ignore events from test environments"
  priority: 1
  condition: "eventSource != null && eventSource.toLowerCase().contains('test')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('🧪 Rule: Ignoring TEST event: ' + envelope.getEventId())"


# Rule 3: Validate Event Payload
- name: "AUTH - Validate Payload"
  description: "Ensure event payload is not empty"
  priority: 2
  condition: "eventPayload == null || eventPayload.trim().isEmpty() || eventPayload.equals('{}') || eventPayload.equals('null')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('⚠️ Rule: Ignoring event with empty payload: ' + envelope.getEventId())"


# Rule 4: Default ACQ_ICA to 0 if Non-Numeric
- name: "AUTH - Default ACQ_ICA to 0 if Non-Numeric"
  description: "Set brand to 0 if value is non-numeric"
  priority: 3
  condition: "eventPayload.contains('brand') && eventPayload.contains('\"brand\":\"') && !eventPayload.matches('.*\"brand\":\"[0-9]+\".*')"
  actions:
    - "envelope.setEventPayload(eventPayload.replaceAll('\"brand\":\"[^\"]*\"', '\"brand\":\"0\"'))"
    - "System.out.println('🔧 Rule: Set ACQ_ICA (brand) to default value 0 for event: ' + envelope.getEventId())"


# Rule 5: Ignore if Authorization ID Missing
- name: "AUTH - Ignore if Authorization ID Missing"
  description: "Ignore events where authorizationId is missing"
  priority: 1
  condition: "!eventPayload.contains('authorizationId') || eventPayload.contains('\"authorizationId\":null') || eventPayload.contains('\"authorizationId\":\"\"')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('⚠️ Rule: Ignoring event with missing authorizationId: ' + envelope.getEventId())"


# Rule 6: Validate Event Source
- name: "AUTH - Validate Event Source"
  description: "Ignore events from non-allowed sources"
  priority: 1
  condition: "eventSource == null || (!eventSource.toUpperCase().contains('AUTH'))"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('⚠️ Rule: Ignoring event from invalid source: ' + eventSource + ' for event: ' + envelope.getEventId())"


# Rule 7: Validate Regulatory Region
- name: "AUTH - Validate Regulatory Region"
  description: "Ignore events from non-allowed regulatory regions (STL, ATL only)"
  priority: 1
  condition: "regulatoryRegion == null || (!regulatoryRegion.equalsIgnoreCase('STL') && !regulatoryRegion.equalsIgnoreCase('ATL'))"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('⚠️ Rule: Ignoring event from invalid regulatory region: ' + regulatoryRegion + ' for event: ' + envelope.getEventId())"


# Rule 8: Validate Authorization Amount
- name: "AUTH - Validate Authorization Amount"
  description: "Ignore events where authorizationAmount is missing or zero"
  priority: 2
  condition: "!eventPayload.contains('authorizationAmount') || eventPayload.contains('\"value\":null') || eventPayload.contains('\"value\":0') || eventPayload.contains('\"value\":\"\"')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('⚠️ Rule: Ignoring event with invalid authorizationAmount for event: ' + envelope.getEventId())"


# Rule 9: Validate Authorization Currency
- name: "AUTH - Validate Authorization Currency"
  description: "Ignore events where currency is missing"
  priority: 2
  condition: "!eventPayload.contains('\"currency\"') || eventPayload.contains('\"currency\":null') || eventPayload.contains('\"currency\":\"\"')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('⚠️ Rule: Ignoring event with missing currency for event: ' + envelope.getEventId())"


# Rule 10: Validate Card Account Number
- name: "AUTH - Validate Card Account"
  description: "Ignore events where cardAccountNumber is missing"
  priority: 2
  condition: "!eventPayload.contains('cardAccountNumber') || eventPayload.contains('\"cardAccountNumber\":null') || eventPayload.contains('\"cardAccountNumber\":\"\"')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('⚠️ Rule: Ignoring event with missing cardAccountNumber for event: ' + envelope.getEventId())"


# Rule 11: Default Response Code if Missing
- name: "AUTH - Default Response Code if Missing"
  description: "Set responseCode to UNKNOWN if absent"
  priority: 3
  condition: "!eventPayload.contains('responseCode') || eventPayload.contains('\"responseCode\":null') || eventPayload.contains('\"responseCode\":\"\"')"
  actions:
    - "envelope.setEventPayload(eventPayload.replaceAll('\"responseCode\":\"[^\"]*\"', '\"responseCode\":\"UNKNOWN\"'))"
    - "System.out.println('🔧 Rule: Defaulted responseCode to UNKNOWN for event: ' + envelope.getEventId())"

# Rule 12: Default SW_SER_NUM to 0000 if Non-Numeric
- name: "AUTH - Default SW_SER_NUM to 0000 if Non-Numeric"
  description: "Ensure switchSerialNumber is numeric, otherwise default to 0000"
  priority: 3
  condition: "eventPayload.contains('switchSerialNumber') && eventPayload.contains('\"switchSerialNumber\":\"') && !eventPayload.matches('.*\"switchSerialNumber\":\"[0-9]+\".*')"
  actions:
    - "envelope.setEventPayload(eventPayload.replaceAll('\"switchSerialNumber\":\"[^\"]*\"', '\"switchSerialNumber\":\"0000\"'))"
    - "System.out.println('🔧 Rule: Defaulted SW_SER_NUM to 0000 for event: ' + envelope.getEventId())"
