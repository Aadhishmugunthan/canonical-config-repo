rules:

# Rule 1: Validate Required Metadata
- name: "FUNDING - Validate Required Metadata"
  description: "Ensure eventMetadata is not null or empty"
  priority: 2
  condition: "eventMetadata == null || eventMetadata.trim().isEmpty()"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Ignoring FUNDING event with missing metadata: ' + envelope.getEventId())"


# Rule 2: Ignore Test Events
- name: "FUNDING - Ignore Test Events"
  description: "Ignore events from test environments"
  priority: 1
  condition: "eventSource != null && eventSource.toLowerCase().contains('test')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Ignoring TEST FUNDING event: ' + envelope.getEventId())"


# Rule 3: Validate Event Payload
- name: "FUNDING - Validate Payload"
  description: "Ensure event payload is not empty"
  priority: 2
  condition: "eventPayload == null || eventPayload.trim().isEmpty() || eventPayload.equals('{}') || eventPayload.equals('null')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Ignoring FUNDING event with empty payload: ' + envelope.getEventId())"


# Rule 4: Default Brand if Non-Numeric
- name: "FUNDING - Default ACQ_ICA"
  description: "Set brand to 0 if non-numeric"
  priority: 3
  condition: "envelope.getEventPayload().contains('brand') && !envelope.getEventPayload().matches('.*\"brand\":\"[0-9]+\".*')"
  actions:
    - "envelope.setEventPayload(envelope.getEventPayload().replaceAll('\"brand\":\"[^\"]*\"','\"brand\":\"0\"'))"
    - "System.out.println('Rule: Brand corrected for FUNDING event: ' + envelope.getEventId())"


# Rule 5: Ignore if Funding Transaction ID Missing
- name: "FUNDING - Missing Transaction ID"
  description: "Ignore events where fundingTransactionId is missing"
  priority: 1
  condition: "!envelope.getEventPayload().contains('fundingTransactionId')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Missing fundingTransactionId for event: ' + envelope.getEventId())"


# Rule 6: Validate Event Source
- name: "FUNDING - Validate Event Source"
  description: "Ignore events from invalid sources"
  priority: 1
  condition: "eventSource == null || (!eventSource.toUpperCase().contains('FND') && !eventSource.toUpperCase().contains('FUND'))"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Invalid event source ' + eventSource + ' for event: ' + envelope.getEventId())"


# Rule 7: Validate Regulatory Region
- name: "FUNDING - Validate Regulatory Region"
  description: "Allow only STL or ATL"
  priority: 1
  condition: "regulatoryRegion == null || (!regulatoryRegion.equalsIgnoreCase('STL') && !regulatoryRegion.equalsIgnoreCase('ATL'))"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Invalid regulatory region ' + regulatoryRegion + ' for event: ' + envelope.getEventId())"


# Rule 8: Validate Funding Amount
- name: "FUNDING - Validate Funding Amount"
  description: "Ignore events where fundingAmount is missing"
  priority: 2
  condition: "!envelope.getEventPayload().contains('fundingAmount')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Invalid fundingAmount for event: ' + envelope.getEventId())"


# Rule 9: Validate Funding Currency
- name: "FUNDING - Validate Funding Currency"
  description: "Ignore events where currency is missing"
  priority: 2
  condition: "!envelope.getEventPayload().contains('currency')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Missing currency for event: ' + envelope.getEventId())"


# Rule 10: Validate Funding Method
- name: "FUNDING - Validate Funding Method"
  description: "Ignore events where fundingMethod is missing"
  priority: 2
  condition: "!envelope.getEventPayload().contains('fundingMethod')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Missing fundingMethod for event: ' + envelope.getEventId())"


# Rule 11: Validate Source Account URI
- name: "FUNDING - Validate Source Account URI"
  description: "Ignore events where sourceAccountUri is missing"
  priority: 2
  condition: "!envelope.getEventPayload().contains('sourceAccountUri')"
  actions:
    - "envelope.setIgnore(true)"
    - "System.out.println('Rule: Missing sourceAccountUri for event: ' + envelope.getEventId())"


# Rule 12: Default Response Code
- name: "FUNDING - Default Response Code"
  description: "Set responseCode to UNKNOWN if missing"
  priority: 3
  condition: "!envelope.getEventPayload().contains('responseCode')"
  actions:
    - "envelope.setEventPayload(envelope.getEventPayload().replace('}',' ,\"responseCode\":\"UNKNOWN\"}'))"
    - "System.out.println('Rule: responseCode defaulted for event: ' + envelope.getEventId())"


# Rule 13: Default SW_SER_NUM
- name: "FUNDING - Default SW_SER_NUM"
  description: "Ensure switchSerialNumber is numeric"
  priority: 3
  condition: "envelope.getEventPayload().contains('switchSerialNumber') && !envelope.getEventPayload().matches('.*\"switchSerialNumber\":\"[0-9]+\".*')"
  actions:
    - "envelope.setEventPayload(envelope.getEventPayload().replaceAll('\"switchSerialNumber\":\"[^\"]*\"','\"switchSerialNumber\":\"0000\"'))"
    - "System.out.println('Rule: switchSerialNumber defaulted to 0000 for event: ' + envelope.getEventId())"
